<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
          name="viewport"/>
    <title>Smart Parking System</title>
    <base href="/"/>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap"
          rel="stylesheet">
    <link href="SmartParkingSystem.styles.css" rel="stylesheet"/>
    <link href="data:," rel="icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Manrope", "sans-serif"]
                    },
                    keyframes: {
                        "enter-left": {
                            "0%": {opacity: "0", transform: "translateX(-24px)"},
                            "100%": {opacity: "1", transform: "translateX(0)"}
                        },
                        "enter-right": {
                            "0%": {opacity: "0", transform: "translateX(24px)"},
                            "100%": {opacity: "1", transform: "translateX(0)"}
                        },
                        "enter-bottom": {
                            "0%": {opacity: "0", transform: "translateY(24px)"},
                            "100%": {opacity: "1", transform: "translateY(0)"}
                        },
                        "exit-left": {
                            "0%": {opacity: "1", transform: "translateX(0)"},
                            "100%": {opacity: "0", transform: "translateX(-40px)"}
                        },
                        "exit-right": {
                            "0%": {opacity: "1", transform: "translateX(0)"},
                            "100%": {opacity: "0", transform: "translateX(40px)"}
                        },
                        "exit-bottom": {
                            "0%": {opacity: "1", transform: "translateY(0)"},
                            "100%": {opacity: "0", transform: "translateY(32px)"}
                        }
                    },
                    animation: {
                        "enter-left": "enter-left 1s ease-out forwards",
                        "enter-right": "enter-right 0.88s ease-out forwards 0.12s",
                        "enter-bottom": "enter-bottom 0.5s ease-out forwards",
                        "page-enter-left": "enter-left 0.5s ease-out forwards",
                        "page-enter-right": "enter-right 0.5s ease-out forwards",
                        "page-enter-bottom": "enter-bottom 0.5s ease-out forwards",
                        "exit-left": "exit-left 0.5s ease-in forwards",
                        "exit-right": "exit-right 0.5s ease-in forwards",
                        "exit-bottom": "exit-bottom 0.5s ease-in forwards"
                    },
                    colors: {
                        calm: {
                            50: "#f5fbff",
                            100: "#ebf8ff",
                            500: "#5d99a7",
                            700: "#2f6270",
                            900: "#11414d"
                        },
                        mint: {
                            100: "#eef9f6",
                            200: "#e6f6ef",
                            300: "#d4efe4",
                            700: "#2f6a53"
                        },
                        warm: {
                            100: "#fff5e9",
                            200: "#fff1dc",
                            300: "#ffe6c3",
                            700: "#9a6530"
                        },
                        brand: {
                            100: "#dff3ff",
                            200: "#bfe9ff",
                            300: "#8fdaff",
                            400: "#5ec8ff"
                        }
                    }
                }
            }
        };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html, body, #app {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar,
        #app::-webkit-scrollbar,
        *::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-b from-calm-50 to-mint-100 font-sans text-calm-900 antialiased">
<div class="min-h-screen" id="app"></div>

<script>
    window.initializeLucideIcons = () => {
        if (window.lucide) {
            window.lucide.createIcons();
        }
    };

    window.getViewportLabel = () => `${window.innerWidth} x ${window.innerHeight}`;

    window.smartParkingCamera = (() => {
        let stream = null;
        let hiddenVideo = null;

        const getVideo = (videoId) => {
            const video = document.getElementById(videoId);
            if (!video) {
                throw new Error("Camera preview element was not found.");
            }

            return video;
        };

        const getOptionalVideo = (videoId) => {
            if (!videoId) {
                return null;
            }

            return document.getElementById(videoId);
        };

        const getHiddenVideo = () => {
            if (hiddenVideo) {
                return hiddenVideo;
            }

            hiddenVideo = document.createElement("video");
            hiddenVideo.autoplay = true;
            hiddenVideo.muted = true;
            hiddenVideo.playsInline = true;
            hiddenVideo.style.position = "fixed";
            hiddenVideo.style.width = "1px";
            hiddenVideo.style.height = "1px";
            hiddenVideo.style.opacity = "0";
            hiddenVideo.style.pointerEvents = "none";
            hiddenVideo.style.left = "-10000px";
            hiddenVideo.style.top = "-10000px";
            document.body.appendChild(hiddenVideo);
            return hiddenVideo;
        };

        const attachStream = async (video) => {
            if (!stream || !video) {
                return;
            }

            video.srcObject = stream;
            await video.play();
        };

        const detachVideo = (video) => {
            if (!video) {
                return;
            }

            video.pause();
            video.srcObject = null;
        };

        const stop = () => {
            if (!stream) {
                return;
            }

            for (const track of stream.getTracks()) {
                track.stop();
            }

            stream = null;
            detachVideo(hiddenVideo);
        };

        return {
            start: async (videoId) => {
                return await window.smartParkingCamera.startWithDevice(videoId, null);
            },
            startWithDevice: async (videoId, deviceId) => {
                stop();
                const videoConstraints = deviceId
                    ? {deviceId: {exact: deviceId}}
                    : {facingMode: "environment"};

                stream = await navigator.mediaDevices.getUserMedia({
                    video: videoConstraints,
                    audio: false
                });
                await attachStream(getHiddenVideo());
                await attachStream(getOptionalVideo(videoId));
            },
            attach: async (videoId) => {
                if (!stream) {
                    return;
                }

                await attachStream(getVideo(videoId));
            },
            detach: (videoId) => {
                detachVideo(getOptionalVideo(videoId));
            },
            listDevices: async () => {
                if (!navigator.mediaDevices?.enumerateDevices) {
                    return [];
                }

                const devices = await navigator.mediaDevices.enumerateDevices();
                return devices
                    .filter((device) => device.kind === "videoinput")
                    .map((device, index) => ({
                        id: device.deviceId,
                        label: device.label || `Camera ${index + 1}`
                    }));
            },
            stop: (videoId) => {
                detachVideo(getOptionalVideo(videoId));
                stop();
            },
            capture: (videoId, maxSide) => {
                const video = getOptionalVideo(videoId);
                const captureSource = video?.readyState >= 2 ? video : hiddenVideo;
                if (!stream || !captureSource || captureSource.readyState < 2) {
                    throw new Error("Camera preview is not ready.");
                }

                const canvas = document.createElement("canvas");
                const sourceWidth = captureSource.videoWidth;
                const sourceHeight = captureSource.videoHeight;
                const scale = maxSide && Math.max(sourceWidth, sourceHeight) > maxSide
                    ? maxSide / Math.max(sourceWidth, sourceHeight)
                    : 1;
                canvas.width = Math.max(1, Math.round(sourceWidth * scale));
                canvas.height = Math.max(1, Math.round(sourceHeight * scale));
                const context = canvas.getContext("2d");
                context.drawImage(captureSource, 0, 0, canvas.width, canvas.height);
                return canvas.toDataURL("image/jpeg", 0.88);
            }
        };
    })();
</script>
<script autostart="false" src="_framework/blazor.webview.js"></script>
</body>
</html>
